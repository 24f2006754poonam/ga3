name: Daily Update

on:
  schedule:
    - cron: "25 15 * * *"
  workflow_dispatch:

# Allow GitHub Actions to push back to the repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update daily-status.md (24f2006754@ds.study.iitm.ac.in)
        run: |
          echo "---" >> daily-status.md
          echo "Update on $(date -u)" >> daily-status.md
          echo "Triggered by 24f2006754@ds.study.iitm.ac.in" >> daily-status.md
          echo "---" >> daily-status.md
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add daily-status.md
          git commit -m "Daily update - $(date -u)" || echo "Nothing to commit"
          git push
